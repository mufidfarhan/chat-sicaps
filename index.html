document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

iversity'],\n    },\n  };\n\n  // ===================== screening scripts =====================\n  SCRIPTS = {\n    id: [\n      { cat:'Intensitas', q:'Hai! Aku Capi 🐛 Cerita ya, bagian mana yang gatal dan seberapa parah?',\n        opts:[ {t:'Gatal banget, nggak tahan', r:'Gatal banget, nggak tahan 😣', s:1},\n               {t:'Lumayan gatal aja', r:'Lumayan gatal aja sih', s:0},\n               {t:'Sampai luka garukan', r:'Parah, sampai luka garukan', s:1} ] },\n      { cat:'Waktu', q:'Aduh, ngerti banget. Gatalnya paling kerasa kapan?',\n        opts:[ {t:'Tiap malam', r:'Tiap malam, makin parah', s:2},\n               {t:'Pas mau tidur', r:'Pas mau tidur sampai kebangun', s:2},\n               {t:'Siang juga', r:'Siang juga sih, nggak nentu', s:1} ] },\n      { cat:'Lokasi', q:'Oke. Bagian tubuh mana aja yang gatal?',\n        opts:[ {t:'Sela-sela jari', r:'Sela-sela jari tangan', s:2},\n               {t:'Daerah kelamin', r:'Di daerah selangkangan', s:2},\n               {t:'Ketiak / pinggang', r:'Ketiak sama pinggang', s:1} ] },\n      { cat:'Kontak', q:'Di sekitarmu ada yang ngalamin gatal serupa nggak?',\n        opts:[ {t:'Teman sekamar juga', r:'Teman sekamar juga gatal', s:2},\n               {t:'Banyak yang kena', r:'Banyak yang barengan gatal', s:2},\n               {t:'Cuma aku', r:'Kayaknya cuma aku', s:0} ] },\n      { cat:'Lesi', q:'Kalau dilihat, kulitnya kayak gimana bentuknya?',\n        opts:[ {t:'Bintil kecil', r:'Ada bintil-bintil kecil', s:2},\n               {t:'Merah & beruntusan', r:'Merah-merah beruntusan', s:1},\n               {t:'Cuma kering', r:'Cuma kering aja', s:0} ] },\n      { cat:'Risiko', q:'Terakhir nih — kamu tinggal di pondok/asrama? Sering tukeran baju atau handuk?',\n        opts:[ {t:'Iya, di pondok', r:'Iya, tinggal di pondok yang rame', s:2},\n               {t:'Sering tukeran baju', r:'Sering tukeran baju & sarung', s:2},\n               {t:'Nggak juga', r:'Nggak, jarang sih', s:0} ] },\n    ],\n    en: [\n      { cat:'Intensity', q:'Hi! I\\u2019m Capi 🐛 Tell me, which part itches and how bad is it?',\n        opts:[ {t:'Really itchy, unbearable', r:'Really itchy, I can\\u2019t stand it 😣', s:1},\n               {t:'Just a little itchy', r:'Just a little itchy', s:0},\n               {t:'Itchy until it bleeds', r:'Bad, scratched until it bled', s:1} ] },\n      { cat:'Time', q:'Oh, I totally get it. When does the itch feel worst?',\n        opts:[ {t:'Every night', r:'Every night, getting worse', s:2},\n               {t:'At bedtime', r:'At bedtime, it wakes me up', s:2},\n               {t:'Daytime too', r:'Daytime too, it varies', s:1} ] },\n      { cat:'Location', q:'Okay. Which body parts itch?',\n        opts:[ {t:'Between fingers', r:'Between my fingers', s:2},\n               {t:'Groin area', r:'Around the groin area', s:2},\n               {t:'Armpit / waist', r:'Armpit and waist', s:1} ] },\n      { cat:'Contact', q:'Has anyone around you had a similar itch?',\n        opts:[ {t:'My roommate too', r:'My roommate is itchy too', s:2},\n               {t:'Many got it', r:'Many of us got itchy together', s:2},\n               {t:'Just me', r:'I think it\\u2019s just me', s:0} ] },\n      { cat:'Lesion', q:'When you look at it, what does the skin look like?',\n        opts:[ {t:'Small bumps', r:'There are small bumps', s:2},\n               {t:'Red & rashy', r:'Red and rashy', s:1},\n               {t:'Just dry', r:'Just dry skin', s:0} ] },\n      { cat:'Risk', q:'Last one — do you live in a boarding school/dorm? Often share clothes or towels?',\n        opts:[ {t:'Yes, a dorm', r:'Yes, I live in a crowded dorm', s:2},\n               {t:'Often share clothes', r:'I often share clothes & sarongs', s:2},\n               {t:'Not really', r:'No, rarely', s:0} ] },\n    ],\n  };\n\n  script(){ return this.SCRIPTS[this.state.lang]; }\n\n  // ===================== language =====================\n  setLang = (lang) => {\n    if(this.state.lang===lang) return;\n    try { localStorage.setItem('sicaps_lang', lang); } catch(e){}\n    // remap any in-progress chat messages to the same step indices in the new language\n    this.setState(s => {\n      if(s.screen==='chat' && s.msgs.length){\n        // rebuild: keep nothing fancy — translate bot questions & user picked replies by index where possible\n      }\n      return { lang };\n    });\n  };\n  setLangId = () => this.setLang('id');\n  setLangEn = () => this.setLang('en');\n\n  // ===================== navigation =====================\n  flash(msg){ this.setState({ toast: msg }); clearTimeout(this._t); this._t = setTimeout(()=>this.setState({toast:''}), 2200); }\n  goLanding = () => this.setState({ screen:'landing' });\n  goDemografis = () => this.setState({ screen:'demografis' });\n  goCara = () => this.setState({ screen:'cara' });\n  goHasil = () => this.setState({ screen:'hasil' });\n  goHistory = () => this.setState({ screen:'history', selectedHist:null });\n  loginSoon = () => this.flash(this.L[this.state.lang].loginSoonToast);\n  dismissNudge = () => this.setState({ loginNudgeDismissed:true });\n  dismissHistNudge = () => this.setState({ histNudgeDismissed:true });\n\n  // ===================== riwayat (history) =====================\n  histPressStart = (id) => { clearTimeout(this._hlp); this._hlp = setTimeout(()=> this.setState({ selectedHist:id }), 420); };\n  histPressEnd = () => { clearTimeout(this._hlp); };\n  deleteHist = (id) => { this.setState(s => ({ history: s.history.filter(h=>h.id!==id), selectedHist:null })); this.flash(this.L[this.state.lang].histDeletedToast); };\n  histResult = (item) => this.setState({ score:item.score, screen:'hasil', selectedHist:null });\n  histChat = () => this.flash(this.L[this.state.lang].histChatToast);\n  histContinue = () => this.startScreening();\n\n  // ===================== demografis =====================\n  onNama = (e) => this.setState({ demoNama: e.target.value });\n  onUsia = (e) => this.setState({ demoUsia: e.target.value });\n  onJkL = () => this.setState({ demoJk:'L' });\n  onJkP = () => this.setState({ demoJk:'P' });\n  setPend = (v) => this.setState({ demoPend: v });\n\n  // ===================== chat =====================\n  startScreening = () => {\n    this.setState({ screen:'chat', msgs:[], stepIdx:0, score:0, persona:'adequate', finished:false, typing:false, recording:false, input:'' }, () => {\n      setTimeout(()=> this.askStep(0), 350);\n    });\n  };\n  restartScreening = () => this.startScreening();\n\n  askStep(i){\n    const step = this.script()[i];\n    if(!step) return;\n    this.setState(s => ({ msgs: [...s.msgs, { who:'bot', step:i, text: step.q }], awaiting:true }));\n  }\n\n  advance(reply, sc, optIdx){\n    const i = this.state.stepIdx;\n    let persona = this.state.persona;\n    if(i===0){ persona = (sc===0) ? 'underestimate' : 'adequate'; }\n    this.setState(s => ({\n      msgs: [...s.msgs, { who:'user', step:i, optIdx: (optIdx==null? -1 : optIdx), text: reply }],\n      score: s.score + sc,\n      awaiting: false, typing: true, input:'', persona,\n    }));\n    const next = i + 1;\n    setTimeout(() => {\n      const last = this.script().length;\n      const doneText = this.state.lang==='en'\n        ? 'Thanks for sharing everything! I\\u2019ve finished analyzing 🔍✨'\n        : 'Makasih ya udah cerita lengkap! Aku udah selesai menganalisis 🔍✨';\n      const botText = next >= last ? doneText : this.script()[next].q;\n      this.setState(s => {\n        const msgs = [...s.msgs, next >= last ? { who:'bot', done:true, text: botText } : { who:'bot', step:next, text: botText }];\n        return next >= last\n          ? { typing:false, finished:true, stepIdx: next, msgs }\n          : { typing:false, stepIdx: next, msgs, awaiting:true };\n      }, () => {\n        if(this.state.voiceMode){\n          const idx = this.state.msgs.length - 1;\n          this.speak(botText, idx, () => { if(!this.state.finished && this.state.awaiting) this.startSTT(); });\n        }\n      });\n    }, 1100);\n  }\n\n  choose = (opt, idx) => { if(this.state.awaiting) this.advance(opt.r, opt.s, idx); };\n  onInput = (e) => this.setState({ input: e.target.value });\n  onInputKey = (e) => { if(e.key==='Enter') this.sendText(); };\n  sendText = () => {\n    const t = this.state.input.trim();\n    if(!t || !this.state.awaiting) return;\n    this.advance(t, 1, -1);\n  };\n  plusTap = () => this.flash(this.L[this.state.lang].attachToast);\n\n  // ---- speech-to-text ----\n  micTap = () => {\n    if(this.state.recording){ this.stopSTT(); return; }\n    if(!this.state.awaiting) return;\n    this.startSTT();\n  };\n  startSTT(){\n    this.setState({ recording:true });\n    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;\n    const fallback = () => {\n      const step = this.script()[this.state.stepIdx];\n      const opt = step && step.opts[0];\n      this.setState({ recording:false, input: opt ? opt.r : this.state.input });\n    };\n    if(!SR){ this._sttTimer = setTimeout(fallback, 1700); return; }\n    try {\n      const rec = new SR();\n      rec.lang = this.state.lang==='en' ? 'en-US' : 'id-ID';\n      rec.interimResults = false; rec.maxAlternatives = 1;\n      let got = false;\n      rec.onresult = (e) => { got = true; const t = e.results[0][0].transcript; this.setState({ recording:false, input:t }); };\n      rec.onerror = () => { if(!got){ this._sttTimer = setTimeout(fallback, 200); } };\n      rec.onend = () => { this.setState(s => s.recording ? { recording:false } : null); if(!got){ this._sttTimer = setTimeout(()=>{ if(!got) fallback(); }, 150); } };\n      this._rec = rec; rec.start();\n    } catch(e){ this._sttTimer = setTimeout(fallback, 1700); }\n  }\n  stopSTT(){ try { this._rec && this._rec.stop(); } catch(e){} clearTimeout(this._sttTimer); this.setState({ recording:false }); }\n\n  // ---- text-to-speech ----\n  speak(text, idx, onEnd){\n    const clean = (text||'').replace(/[\\u{1F000}-\\u{1FAFF}\\u2600-\\u27BF\\u2190-\\u21FF\\u2B00-\\u2BFF]/gu,'').trim();\n    this.setState({ ttsId: idx });\n    const done = () => { this.setState(s => s.ttsId===idx ? { ttsId:null } : null); if(onEnd) onEnd(); };\n    const synth = window.speechSynthesis;\n    if(!synth || !clean){ const ms = Math.min(Math.max(clean.length*55, 700), 3200); this._ttsTimer = setTimeout(done, ms); return; }\n    try {\n      synth.cancel();\n      const u = new SpeechSynthesisUtterance(clean);\n      const playful = this.state.demoPend===this.L.id.pendOpts[0] || this.state.demoPend===this.L.en.pendOpts[0];\n      u.rate = playful ? 0.85 : 0.95; u.pitch = playful ? 1.1 : 1.0;\n      u.lang = this.state.lang==='en' ? 'en-US' : 'id-ID';\n      u.onend = done; u.onerror = done;\n      synth.speak(u);\n      this._ttsTimer = setTimeout(() => { if(this.state.ttsId===idx) done(); }, Math.min(Math.max(clean.length*90, 1500), 6000));\n    } catch(e){ done(); }\n  }\n  pressStart = (idx, text) => { clearTimeout(this._lp); this._lp = setTimeout(() => this.speak(text, idx), 300); };\n  pressEnd = () => { clearTimeout(this._lp); };\n\n  toggleVoiceMode = () => { const on = !this.state.voiceMode; this.setState({ voiceMode:on }); this.flash(on ? this.L[this.state.lang].voiceOn : this.L[this.state.lang].voiceOff); };\n\n  toggleIncognito = () => { const on = !this.state.incognito; this.setState({ incognito:on }); this.flash(on ? this.L[this.state.lang].incogOn : this.L[this.state.lang].incogOff); };\n\n  componentDidUpdate(){ const el = this.msgsRef.current; if(el) el.scrollTo({ top: el.scrollHeight, behavior:'smooth' }); }\n\n  // ===================== scoring & copy =====================\n  levelFor(score){\n    const en = this.state.lang==='en';\n    if(score>=7) return { key:'tinggi', label: en?'High Risk':'Risiko Tinggi', chip:'background:#ff6bae;color:#fff' };\n    if(score>=4) return { key:'sedang', label: en?'Medium Risk':'Risiko Sedang', chip:'background:#ffc93c;color:#5a3d00' };\n    return { key:'rendah', label: en?'Low Risk':'Risiko Rendah', chip:'background:#c6f24e;color:#3a4d0a' };\n  }\n  resultCopy(lvl){\n    const en = this.state.lang==='en';\n    if(lvl==='tinggi') return en ? {\n      kesimpulan:'Your symptoms — night-time itch between the fingers with a contact history — strongly suggest scabies.',\n      persona:'Relax, this is common in dorms and very treatable. The key is not to delay.',\n      aksi:['See a health worker soon','Avoid sharing clothes, towels & bedding','Wash sheets and clothes in hot water'],\n      saran:'Since you live in a dorm, ask your roommates to get checked too so it doesn\\u2019t keep spreading.',\n    } : {\n      kesimpulan:'Gejalamu — gatal malam di sela jari dengan riwayat kontak — menunjukkan kemungkinan besar skabies.',\n      persona:'Tenang, kondisi ini umum di pondok dan bisa ditangani dengan baik. Yang penting jangan ditunda ya.',\n      aksi:['Segera periksa ke tenaga kesehatan','Hindari berbagi baju, handuk & kasur','Cuci sprei dan pakaian dengan air panas'],\n      saran:'Karena kamu tinggal di asrama, ajak teman sekamar ikut diperiksa supaya nggak saling menular ya.',\n    };\n    if(lvl==='sedang') return en ? {\n      kesimpulan:'Your symptoms point to suspected scabies and need further evaluation.',\n      persona:'You\\u2019re on the right track — noticing symptoms early is a good thing.',\n      aksi:['Monitor symptoms for 2-3 days','See a health worker if it worsens','Keep skin clean & change clothes regularly'],\n      saran:'Try bathing regularly and avoid scratching. If the itch gets more frequent at night, get checked.',\n    } : {\n      kesimpulan:'Gejalamu mengarah ke curiga skabies dan perlu evaluasi lebih lanjut.',\n      persona:'Kamu sudah di pemahaman yang tepat — memperhatikan gejala sejak awal itu bagus.',\n      aksi:['Pantau perkembangan gejala 2-3 hari','Segera periksa kalau makin parah','Jaga kebersihan kulit & ganti pakaian rutin'],\n      saran:'Coba mandi teratur dan hindari menggaruk. Kalau gatal makin sering di malam hari, segera periksa.',\n    };\n    return en ? {\n      kesimpulan:'Your symptoms are unlikely to point to scabies.',\n      persona:'Even though it looks mild, keep an eye on it — scabies can spread to others.',\n      aksi:['Keep your skin clean','Use moisturizer if skin is dry','Get checked if it doesn\\u2019t improve'],\n      saran:'It doesn\\u2019t seem to point to scabies. Keep clean and watch it over the next few days.',\n    } : {\n      kesimpulan:'Gejalamu kemungkinan kecil mengarah ke skabies.',\n      persona:'Walaupun terlihat ringan, tetap perhatikan ya — skabies bisa menular ke orang lain.',\n      aksi:['Jaga kebersihan kulit','Gunakan pelembap bila kulit kering','Periksa bila keluhan tidak membaik'],\n      saran:'Sepertinya belum mengarah ke skabies. Tetap jaga kebersihan dan amati beberapa hari ke depan.',\n    };\n  }\n\n  jkStyle(active){\n    return 'flex:1;border:2px solid;border-radius:14px;padding:13px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;' +\n      (active ? 'background:#6c4df6;color:#fff;border-color:#6c4df6' : 'background:#fff;color:#6c4df6;border-color:#ece7ff');\n  }\n  langBtn(active, light){\n    if(light){\n      return 'border:none;border-radius:100px;padding:4px 11px;font-size:11.5px;font-weight:700;cursor:pointer;font-family:inherit;' +\n        (active ? 'background:#fff;color:#6c4df6' : 'background:transparent;color:#fff');\n    }\n    return 'border:none;border-radius:100px;padding:4px 11px;font-size:11.5px;font-weight:700;cursor:pointer;font-family:inherit;' +\n      (active ? 'background:#6c4df6;color:#fff' : 'background:transparent;color:#8a7fc0');\n  }\n\n  renderVals(){\n    const s = this.state;\n    const t = this.L[s.lang];\n    const screen = s.screen;\n    const lvl = this.levelFor(s.score);\n    const copy = this.resultCopy(lvl.key);\n    const scr = this.script();\n\n    const msgs = s.msgs.map((m, i) => {\n      const bot = m.who==='bot';\n      // live-translate by step/option index so language toggle updates the transcript\n      let text = m.text;\n      if(bot && m.done){ text = s.lang==='en' ? 'Thanks for sharing everything! I\\u2019ve finished analyzing 🔍✨' : 'Makasih ya udah cerita lengkap! Aku udah selesai menganalisis 🔍✨'; }\n      else if(bot && typeof m.step==='number' && scr[m.step]){ text = scr[m.step].q; }\n      else if(!bot && typeof m.step==='number' && m.optIdx>=0 && scr[m.step] && scr[m.step].opts[m.optIdx]){ text = scr[m.step].opts[m.optIdx].r; }\n      const speaking = s.ttsId===i;\n      const base = bot\n        ? 'background:#fff;border-radius:6px 20px 20px 20px;padding:12px 14px;font-size:14px;line-height:1.5;color:#211a3b;cursor:pointer;user-select:none;transition:transform .2s'\n        : 'background:#6c4df6;border-radius:20px 6px 20px 20px;padding:12px 14px;font-size:14px;line-height:1.5;color:#fff;cursor:pointer;user-select:none;transition:transform .2s';\n      const fx = speaking ? ';transform:scale(1.03);animation:scTtsPulse 1s infinite' : (bot ? ';box-shadow:0 3px 10px rgba(108,77,246,.1)' : '');\n      return {\n        text,\n        rowStyle: bot ? 'align-self:flex-start;max-width:86%' : 'align-self:flex-end;max-width:86%',\n        bubbleStyle: base + fx,\n        onPressStart: () => this.pressStart(i, text),\n        onPressEnd: this.pressEnd,\n      };\n    });\n\n    const hasInput = (s.input || '').trim().length > 0;\n    const step = scr[s.stepIdx];\n    const options = (s.awaiting && step && !s.typing && !s.recording)\n      ? step.opts.map((o,idx) => ({ t:o.t, on:()=>this.choose(o, idx) })) : [];\n\n    const pendOpts = t.pendOpts;\n    const pendOptions = pendOpts.map((p,idx) => ({\n      label:p, on:()=>this.setPend(p),\n      style:'border:2px solid;border-radius:100px;padding:10px 15px;font-size:13.5px;font-weight:600;cursor:pointer;font-family:inherit;' +\n        (s.demoPend===p ? 'background:#6c4df6;color:#fff;border-color:#6c4df6' : 'background:#fff;color:#6c4df6;border-color:#ece7ff'),\n    }));\n    const isSD = s.demoPend===pendOpts[0];\n    const themeHint = isSD ? t.themeSD : (s.demoPend ? t.themeHybrid : t.themeNone);\n\n    const historyItems = s.history.map(h => {\n      const lv = this.levelFor(h.score);\n      const sel = s.selectedHist===h.id;\n      return {\n        date: s.lang==='en' ? h.dateEn : h.dateId,\n        modeLabel: h.mode==='ai' ? t.histModeAI : t.histModeQ,\n        modeChipStyle: 'font-size:11px;font-weight:700;border-radius:100px;padding:4px 10px;' + (h.mode==='ai' ? 'background:#ece7ff;color:#6c4df6' : 'background:#eef7d8;color:#5a7d0a'),\n        finished: h.finished, unfinished: !h.finished,\n        score: h.score, levelLabel: lv.label, levelChipStyle: lv.chip,\n        onPressStart: () => this.histPressStart(h.id),\n        onPressEnd: this.histPressEnd,\n        onDelete: () => this.deleteHist(h.id),\n        onResult: () => this.histResult(h),\n        onChat: this.histChat,\n        onContinue: this.histContinue,\n        cardStyle: 'position:relative;background:' + (sel?'#faf8ff':'#fff') + ';border-radius:16px;padding:14px 16px;box-shadow:0 2px 10px rgba(108,77,246,.06);border:2px solid ' + (sel?'#6c4df6':'#fff') + ';user-select:none;transition:transform .15s,border-color .15s' + (sel?';transform:scale(.99)':''),\n        delStyle: sel\n          ? 'position:absolute;top:11px;right:13px;display:inline-flex;align-items:center;gap:5px;background:#ff5a7a;color:#fff;border:none;border-radius:10px;padding:7px 12px;font-size:12px;font-weight:700;font-family:inherit;cursor:pointer;box-shadow:0 4px 12px rgba(255,90,122,.4)'\n          : 'display:none',\n      };\n    });\n\n    return {\n      t,\n      isLanding: screen==='landing', isDemografis: screen==='demografis', isChat: screen==='chat',\n      isHasil: screen==='hasil', isCara: screen==='cara', isHistory: screen==='history',\n      goHistory:this.goHistory, hasHistory: s.history.length>0, histEmpty: s.history.length===0,\n      loginSoon:this.loginSoon,\n      showLoginNudge: screen==='hasil' && !s.loginNudgeDismissed, dismissNudge:this.dismissNudge,\n      showHistNudge: screen==='history' && s.history.length>0 && !s.histNudgeDismissed, dismissHistNudge:this.dismissHistNudge,\n      historyItems,\n\n      // language\n      setLangId:this.setLangId, setLangEn:this.setLangEn,\n      langIdStyle:this.langBtn(s.lang==='id', false), langEnStyle:this.langBtn(s.lang==='en', false),\n      langIdStyleLight:this.langBtn(s.lang==='id', true), langEnStyleLight:this.langBtn(s.lang==='en', true),\n\n      // demografis\n      demoNama:s.demoNama, demoUsia:s.demoUsia, onNama:this.onNama, onUsia:this.onUsia,\n      onJkL:this.onJkL, onJkP:this.onJkP, jkLStyle:this.jkStyle(s.demoJk==='L'), jkPStyle:this.jkStyle(s.demoJk==='P'),\n      pendOptions, themeHint, goLanding:this.goLanding, goDemografis:this.goDemografis, goCara:this.goCara,\n      startScreening:this.startScreening,\n\n      // chat\n      msgsRef:this.msgsRef,\n      msgs, options, typing:s.typing, recording:s.recording, finished:s.finished,\n      showOptions: options.length>0 && !s.finished && !s.recording,\n      showInput: !s.finished,\n      input:s.input, onInput:this.onInput, onInputKey:this.onInputKey,\n      inputPlaceholder: s.recording ? t.phRecording : (s.voiceMode ? t.phVoice : t.phIdle),\n      chatStatus: s.recording ? t.statusListening : (s.typing ? t.statusTyping : t.statusOnline),\n      chatSavedLabel: s.incognito ? t.chatSavedIncog : t.chatSaved,\n      toggleIncognito:this.toggleIncognito,\n      incogIconColor: s.incognito ? '#fff' : '#6c4df6',\n      incogBtnStyle: 'width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;flex:none;border:none;' +\n        (s.incognito ? 'background:#211a3b' : 'background:#ece7ff'),\n      goHasil:this.goHasil,\n      plusTap:this.plusTap,\n      micTap:this.micTap, micIconColor: s.recording ? '#fff' : '#6c4df6',\n      micBtnStyle: 'width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;flex:none;border:none;' +\n        (s.recording ? 'background:#ff5a7a;animation:scBlink .8s infinite' : 'background:transparent'),\n      showSend: hasInput, sendText:this.sendText,\n      showVoiceMode: !hasInput, toggleVoiceMode:this.toggleVoiceMode,\n      voiceBarColor: s.voiceMode ? '#fff' : '#6c4df6',\n      voiceModeBtnStyle: 'width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;flex:none;border:none;' +\n        (s.voiceMode ? 'background:#6c4df6;box-shadow:0 4px 12px rgba(108,77,246,.34);animation:scSendGlow 1.2s infinite' : 'background:#ece7ff'),\n\n      // hasil\n      score:s.score, levelLabel:lvl.label, levelChipStyle:lvl.chip, needsReview: s.score>=4,\n      resKesimpulan:copy.kesimpulan, resPersona:copy.persona, resSaran:copy.saran,\n      resAksi: copy.aksi.map(x=>({text:x})), restartScreening:this.restartScreening,\n\n      toast:s.toast,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
